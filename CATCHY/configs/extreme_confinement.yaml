# Extreme confinement: C ≳ 3
# Need denser network (λ=1.51) or large enzymes
# This is where enzymatic activity is predicted to matter most

system:
  N_m: 8000
  rho_m0: 0.375           # denser → λ = 1.51 (Paper 1 Table 1)
  c: 0.1
  mean_strand: 6
  seed: 42

enzyme:
  sigma_list: [5.0, 6.0, 7.0]   # C ≈ 3.31, 3.97, 4.64
  phi_E: 0.01                    # fewer enzymes (large ones would overlap)
  interaction: attractive
  k_cat: 0.005
  r_cleave: 1.5

simulation:
  T: 1.0
  dt: 0.004              # smaller dt for stability at high density
  gamma_m: 0.1
  n_equil_network: 800000   # longer equilibration at high density
  n_equil_enzyme: 500000
  n_production: 5000000     # longer production — D very small
  save_interval: 2000
  platform: CUDA

output:
  dir: ../output/extreme
